<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Workshop</title>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section>
          <h1>RAG Workshop</h1>
          <p>From Retrieval to Context</p>
        </section>
        <!-- RAG concept animation slide -->
        <section id="slide-rag-concept">
          <h2 style="margin-bottom: 0.3em; font-size: 1.4em;">What is RAG?</h2>

          <svg class="rag-scene" viewBox="0 0 800 265" xmlns="http://www.w3.org/2000/svg">

            <!-- ── Ground ── -->
            <line x1="60" y1="228" x2="740" y2="228" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

            <!-- ══════════════════════════════════════
                 DATA PILE  (static, fades out when grabbed)
                 Center x=110, docs rest on y=225
            ══════════════════════════════════════ -->
            <g id="data-pile">
              <circle cx="110" cy="195" r="48" fill="#1d4ed8" opacity="0.08"/>
              <!-- stacked docs -->
              <rect x="72" y="213" width="76" height="12" rx="3" fill="#1d4ed8"/>
              <rect x="75" y="200" width="76" height="12" rx="3" fill="#2563eb"/>
              <rect x="78" y="187" width="76" height="12" rx="3" fill="#3b82f6"/>
              <rect x="81" y="174" width="76" height="12" rx="3" fill="#60a5fa"/>
              <!-- doc lines -->
              <line x1="86" y1="179" x2="148" y2="179" stroke="white" stroke-width="1.2" opacity="0.35"/>
              <line x1="86" y1="185" x2="140" y2="185" stroke="white" stroke-width="1.2" opacity="0.35"/>
              <line x1="83" y1="192" x2="148" y2="192" stroke="white" stroke-width="1.2" opacity="0.35"/>
              <line x1="83" y1="198" x2="140" y2="198" stroke="white" stroke-width="1.2" opacity="0.35"/>
              <!-- label -->
              <text x="110" y="162" text-anchor="middle" font-size="11" fill="rgba(147,197,253,0.75)" font-family="monospace">Documents / DB</text>
            </g>

            <!-- ══════════════════════════════════════
                 DS CHARACTER
                 Group origin = feet bottom (0,0)
                 #ds-position animates this group across the scene
            ══════════════════════════════════════ -->
            <g id="ds-position">

              <!-- shadow -->
              <ellipse cx="0" cy="2" rx="22" ry="5" fill="rgba(0,0,0,0.18)"/>

              <!-- shoes -->
              <ellipse cx="-11" cy="0" rx="11" ry="5" fill="#0f172a"/>
              <ellipse cx="11"  cy="0" rx="11" ry="5" fill="#0f172a"/>

              <!-- legs -->
              <rect x="-20" y="-30" width="15" height="30" rx="5" fill="#1e3a5f"/>
              <rect x="5"   y="-30" width="15" height="30" rx="5" fill="#1e3a5f"/>

              <!-- body / lab coat -->
              <rect x="-24" y="-72" width="48" height="44" rx="7" fill="#f8fafc"/>
              <!-- coat tint -->
              <rect x="-24" y="-72" width="48" height="44" rx="7" fill="#2563eb" opacity="0.08"/>
              <!-- lapels -->
              <polygon points="-6,-72 0,-58 -24,-72" fill="white" opacity="0.9"/>
              <polygon points=" 6,-72 0,-58  24,-72" fill="white" opacity="0.9"/>
              <!-- pocket -->
              <rect x="-20" y="-55" width="14" height="16" rx="2" fill="none" stroke="rgba(37,99,235,0.35)" stroke-width="1.2"/>
              <rect x="-17" y="-58" width="3.5" height="11" rx="1.5" fill="#ef4444"/>

              <!-- left arm (relaxed) -->
              <rect x="-44" y="-62" width="22" height="10" rx="5" fill="#fbbf7a"/>
              <circle cx="-46" cy="-57" r="6.5" fill="#fbbf7a"/>

              <!-- right arm (animates reach) -->
              <g id="ds-arm-r">
                <rect x="22" y="-62" width="26" height="10" rx="5" fill="#fbbf7a"/>
                <!-- hand -->
                <circle cx="50" cy="-57" r="7" fill="#fbbf7a"/>
              </g>

              <!-- neck -->
              <rect x="-6" y="-80" width="12" height="10" rx="3" fill="#fbbf7a"/>

              <!-- head -->
              <circle cx="0" cy="-105" r="30" fill="#fbbf7a"/>

              <!-- graduation cap board -->
              <rect x="-26" y="-138" width="52" height="7" rx="2" fill="#0f172a"/>
              <!-- cap top -->
              <rect x="-9" y="-147" width="18" height="11" rx="3" fill="#0f172a"/>
              <!-- tassel -->
              <line x1="22" y1="-138" x2="29" y2="-122" stroke="#fbbf24" stroke-width="2.5"/>
              <circle cx="29" cy="-119" r="4" fill="#fbbf24"/>

              <!-- eyes whites -->
              <circle cx="-10" cy="-107" r="8"  fill="white"/>
              <circle cx=" 10" cy="-107" r="8"  fill="white"/>
              <!-- pupils -->
              <circle cx="-9"  cy="-106" r="4.5" fill="#1e293b"/>
              <circle cx=" 11" cy="-106" r="4.5" fill="#1e293b"/>
              <!-- eye shine -->
              <circle cx="-7"  cy="-109" r="1.8" fill="white"/>
              <circle cx=" 13" cy="-109" r="1.8" fill="white"/>

              <!-- blush -->
              <ellipse cx="-21" cy="-100" rx="7"   ry="4"   fill="#fca5a5" opacity="0.55"/>
              <ellipse cx=" 21" cy="-100" rx="7"   ry="4"   fill="#fca5a5" opacity="0.55"/>

              <!-- smile -->
              <path d="M-8,-93 Q0,-86 8,-93" fill="none" stroke="#92400e" stroke-width="2.2" stroke-linecap="round"/>

              <!-- DS label -->
              <text x="0" y="-145" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.55)" font-family="monospace">Data Scientist</text>

              <!-- ① Retrieve — child of ds-position, follows DS automatically -->
              <text id="label-retrieve" x="0" y="-163" text-anchor="middle"
                    font-size="12" fill="#93c5fd" font-family="monospace" opacity="0">① Retrieve</text>
            </g>

            <!-- ══════════════════════════════════════
                 AGENT CHARACTER
                 Feet at (660, 226)
            ══════════════════════════════════════ -->
            <g id="agent-char" transform="translate(660,226)">

              <!-- shadow -->
              <ellipse cx="0" cy="2" rx="26" ry="6" fill="rgba(0,0,0,0.2)"/>

              <!-- feet-plates -->
              <rect x="-26" y="-8"  width="22" height="9" rx="4" fill="#6d28d9"/>
              <rect x="4"   y="-8"  width="22" height="9" rx="4" fill="#6d28d9"/>

              <!-- legs -->
              <rect x="-22" y="-36" width="17" height="28" rx="5" fill="#4c1d95"/>
              <rect x="5"   y="-36" width="17" height="28" rx="5" fill="#4c1d95"/>

              <!-- body -->
              <rect x="-30" y="-82" width="60" height="48" rx="9" fill="#7c3aed"/>

              <!-- chest panel -->
              <rect x="-20" y="-74" width="40" height="28" rx="4" fill="#4c1d95" opacity="0.55"/>

              <!-- processing dots -->
              <circle class="dot" cx="-9" cy="-60" r="3" fill="#4c1d95"/>
              <circle class="dot" cx=" 0" cy="-60" r="3" fill="#4c1d95"/>
              <circle class="dot" cx=" 9" cy="-60" r="3" fill="#4c1d95"/>

              <!-- arms -->
              <rect x="-48" y="-74" width="20" height="10" rx="5" fill="#6d28d9"/>
              <rect x=" 28" y="-74" width="20" height="10" rx="5" fill="#6d28d9"/>

              <!-- head box -->
              <rect x="-30" y="-135" width="60" height="55" rx="11" fill="#6d28d9"/>

              <!-- face screen -->
              <rect x="-22" y="-128" width="44" height="38" rx="6" fill="#0f0a1e"/>

              <!-- eyes (LEDs) -->
              <circle cx="-10" cy="-113" r="9" fill="#10b981"/>
              <circle cx=" 10" cy="-113" r="9" fill="#10b981"/>
              <!-- shine -->
              <circle cx="-7"  cy="-116" r="3"   fill="white" opacity="0.4"/>
              <circle cx=" 13" cy="-116" r="3"   fill="white" opacity="0.4"/>

              <!-- mouth bar -->
              <rect x="-13" y="-99" width="26" height="5" rx="2.5" fill="#1e1b4b"/>

              <!-- antenna stem -->
              <rect x="-3.5" y="-148" width="7" height="15" rx="3.5" fill="#7c3aed"/>
              <!-- antenna ball -->
              <circle cx="0" cy="-151" r="7" fill="#f43f5e"/>

              <!-- label -->
              <text x="0" y="-162" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.55)" font-family="monospace">LLM Agent</text>
            </g>

            <!-- ══════════════════════════════════════
                 AGENT GLOW (activate ring)
            ══════════════════════════════════════ -->
            <g id="agent-glow" opacity="0">
              <circle cx="660" cy="155" r="76" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>
              <circle cx="660" cy="155" r="96" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
            </g>

            <!-- ══════════════════════════════════════
                 CONTEXT BOX — right of agent
                 x=700–792, y=152–224
            ══════════════════════════════════════ -->
            <g id="context-box">
              <!-- border -->
              <rect x="700" y="152" width="92" height="72" rx="6"
                    fill="rgba(124,58,237,0.07)"
                    stroke="rgba(167,139,250,0.55)" stroke-width="1.5"
                    stroke-dasharray="5,3"/>
              <!-- label -->
              <text x="746" y="146" text-anchor="middle" font-size="10"
                    fill="rgba(167,139,250,0.7)" font-family="monospace"
                    letter-spacing="1">CONTEXT</text>
              <!-- docs inside — animated -->
              <g id="context-data" opacity="0">
                <rect x="708" y="162" width="76" height="7" rx="2" fill="#60a5fa" opacity="0.8"/>
                <rect x="708" y="172" width="76" height="7" rx="2" fill="#93c5fd" opacity="0.8"/>
                <rect x="708" y="182" width="56" height="7" rx="2" fill="#bfdbfe" opacity="0.8"/>
                <line x1="712" y1="166" x2="776" y2="166" stroke="white" stroke-width="0.8" opacity="0.25"/>
                <line x1="712" y1="176" x2="776" y2="176" stroke="white" stroke-width="0.8" opacity="0.25"/>
              </g>
            </g>

            <!-- ══════════════════════════════════════
                 FLOW LABELS (② and ③ — static positions)
                 ① Retrieve lives inside #ds-position above
            ══════════════════════════════════════ -->
            <!-- ② above context box; two lines centered at x=750 so left edge (718) clears
                 agent head right edge (690) with 28px gap, right edge (782) fits in viewBox -->
            <text id="label-augment" x="750" y="106" text-anchor="middle"
                  font-size="12" fill="#c4b5fd" font-family="monospace" opacity="0">
              <tspan x="750" dy="0">② Augment</tspan>
              <tspan x="750" dy="15">Context</tspan>
            </text>

            <!-- ③ above agent; y=35 gives 29px gap from "LLM Agent" label at y=64 -->
            <text id="label-generate" x="660" y="35" text-anchor="middle"
                  font-size="12" fill="#6ee7b7" font-family="monospace" opacity="0">③ Generate</text>

            <!-- ══════════════════════════════════════
                 FLYING DATA — MUST be last SVG element to paint on top of
                 agent-char. Floats from DS hand (558,163) → context box.
                 Group origin (0,0); CSS translate positions it in SVG space.
            ══════════════════════════════════════ -->
            <g id="flying-data" opacity="0">
              <rect x="-28" y="-5"  width="56" height="8" rx="2.5" fill="#60a5fa" opacity="0.95"/>
              <rect x="-25" y="-15" width="56" height="8" rx="2.5" fill="#93c5fd" opacity="0.95"/>
              <line x1="-22" y1="-10" x2="22" y2="-10" stroke="white" stroke-width="1" opacity="0.4"/>
              <line x1="-22" y1="-1"  x2="20" y2="-1"  stroke="white" stroke-width="1" opacity="0.4"/>
            </g>

          </svg>

          <p style="color: rgba(255,255,255,0.4); font-size: 0.7em; margin-top: 0.2em; letter-spacing: 0.1em;">
            RETRIEVE &nbsp;→&nbsp; AUGMENT &nbsp;→&nbsp; GENERATE
          </p>
        </section>
        <section>
          <h2>Let's Build</h2>
          <p>Hands-on session coming soon...</p>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
